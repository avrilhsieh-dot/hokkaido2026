                <p class="text-xs text-milktea-500 font-medium mt-0.5">2026.07.03 - 07.11</p>
            </div>
            
            <div class="flex items-center gap-1.5 text-[10px] font-bold px-2.5 py-1 rounded-full border shadow-sm transition-all" :class="isCloudSync ? 'bg-green-50 text-green-600 border-green-200' : 'bg-gray-100 text-gray-500 border-gray-200'">
                <div class="w-1.5 h-1.5 rounded-full" :class="isCloudSync ? 'bg-green-500 animate-pulse' : 'bg-gray-400'"></div>
                {{ isCloudSync ? '雲端同步中' : '單機模式' }}
            </div>
        </div>

        <div v-show="['itinerary', 'map', 'expenses'].includes(currentTab)" class="flex overflow-x-auto hide-scrollbar py-2 gap-3" ref="dateScroller">
            <button v-for="(day, index) in itinerary" :key="index" @click="selectDay(index)" class="flex-shrink-0 flex flex-col items-center justify-center w-16 h-16 rounded-2xl transition-colors duration-300 border" :class="currentDay === index ? 'bg-milktea-400 text-white border-milktea-400 shadow-md' : 'bg-white text-milktea-500 border-milktea-200'">
                <span class="text-[10px] font-medium mb-1">Day {{ day.dayNum }}</span>
                <span class="text-base font-bold">{{ day.dateShort }}</span>
            </button>
            <div class="flex-shrink-0 w-2"></div>
        </div>
    </header>

    <main class="flex-1 overflow-y-auto hide-scrollbar pb-24 px-4 pt-4 relative bg-[#FDFBF7]">
        
        <!-- 行程 -->
        <div v-show="currentTab === 'itinerary'" class="space-y-0">
            <div class="flex items-center justify-between mb-4 px-1">
                <h2 class="text-lg font-bold text-milktea-900">{{ currentDayData.title }}</h2>
                <span class="text-sm text-milktea-500 font-bold"><i class="fas fa-location-dot mr-1"></i> {{ currentDayData.area }}</span>
            </div>

            <div class="relative">
                <div class="absolute left-4 top-4 bottom-4 w-0.5 bg-milktea-200 z-0"></div>
                <template v-for="(item, idx) in currentDayData.events" :key="idx">
                    <div class="relative z-10 flex mb-2">
                        <div class="flex flex-col items-center mr-4 w-8 flex-shrink-0">
                            <div class="w-8 h-8 rounded-full bg-white border-2 border-milktea-400 flex items-center justify-center shadow-sm">
                                <i :class="item.icon + ' text-milktea-500 text-xs'"></i>
                            </div>
                        </div>
                        <div class="flex-1 bg-white rounded-2xl p-4 shadow-sm border border-milktea-100">
                            <div class="flex justify-between items-start mb-1">
                                <span class="text-xs font-bold text-milktea-400 tracking-wider">{{ item.time }}</span>
                            </div>
                            <div class="flex items-center flex-wrap gap-2">
                                <h3 class="text-base font-bold text-milktea-800 leading-snug">{{ item.title }}</h3>
                                <a v-if="item.lat &amp;&amp; !item.hideNav" :href="'https://www.google.com/maps/search/?api=1&amp;query=' + encodeURIComponent(item.title)" target="_blank" class="nav-icon-btn shadow-sm">
                                    <i class="fas fa-location-arrow text-[12px]"></i>
                                </a>
                            </div>
                            <p class="text-xs text-milktea-500 mt-2 italic leading-relaxed">{{ item.guide }}</p>
                        </div>
                    </div>
                    <div v-if="item.travelTime" class="relative z-10 flex">
                        <div class="w-8 mr-4 flex-shrink-0"></div>
                        <div class="text-[10px] font-bold text-milktea-500 bg-milktea-50 px-3 py-1 rounded-full border border-dashed border-milktea-200 mb-4 ml-2">
                            <i :class="(item.travelMode === 'walk' ? 'fas fa-walking' : 'fas fa-car') + ' mr-1.5'"></i>
                            {{ item.travelTime }}
                        </div>
                    </div>
                </template>
            </div>
        </div>

        <!-- 地圖 -->
        <div v-show="currentTab === 'map'" class="h-full">
            <div id="map" class="shadow-md border border-milktea-200"></div>
        </div>

        <!-- 記帳 -->
        <div v-show="currentTab === 'expenses'" class="h-full relative">
            <div class="bg-white rounded-2xl p-4 shadow-sm border border-milktea-100 mb-4 flex justify-between items-center">
               <span class="text-milktea-500 font-bold text-sm">本日合計花費</span>
               <span class="text-xl font-bold text-milktea-900">NT$ {{ dayTotalTWD }}</span>
            </div>
            <div class="space-y-3 pb-24">
                <div v-for="exp in dayExpenses" :key="exp.id" class="bg-white rounded-xl p-3 shadow-sm border border-milktea-100 flex justify-between items-center">
                    <div>
                        <h3 class="font-bold text-milktea-900">{{ exp.shop }}</h3>
                        <span class="text-[10px] bg-milktea-100 px-2 rounded">{{ exp.category }}</span>
                    </div>
                    <div class="text-right">
                        <div class="font-bold text-milktea-900">NT$ {{ exp.amountTWD }}</div>
                        <button @click="confirmDelete(exp.id)" class="text-red-300 text-xs mt-2"><i class="fas fa-trash"></i></button>
                    </div>
                </div>
            </div>
            <button @click="openExpenseForm" class="absolute bottom-6 right-1 bg-milktea-500 text-white w-14 h-14 rounded-full shadow-lg flex items-center justify-center text-xl z-20">
                <i class="fas fa-plus"></i>
            </button>
        </div>

        <!-- 行李 -->
        <div v-show="currentTab === 'luggage'" class="h-full relative">
            <div class="flex overflow-x-auto hide-scrollbar gap-2 mb-4">
                <button v-for="person in luggagePeople" :key="person" @click="currentLuggagePerson = person" class="px-4 py-1.5 rounded-full text-xs font-bold border transition-all" :class="currentLuggagePerson === person ? 'bg-milktea-500 text-white' : 'bg-white text-milktea-400 border-milktea-200'">
                    {{ person }}
                </button>
            </div>
            <div class="space-y-5 pb-24">
                <template v-for="cat in luggageCategories" :key="cat">
                    <div v-if="getLuggageByCategory(cat).length > 0">
                        <h3 class="font-bold text-sm mb-2 border-l-4 border-milktea-400 pl-2">{{ cat }}</h3>
                        <div class="bg-white rounded-xl shadow-sm border border-milktea-100">
                            <div v-for="item in getLuggageByCategory(cat)" :key="item.id" class="p-3 border-b border-milktea-50 flex items-center justify-between">
                                <label class="flex items-center gap-3 flex-1 cursor-pointer">
                                    <input type="checkbox" v-model="item.checked" @change="toggleLuggageChecked(item)" class="checkbox-custom">
                                    <span :class="item.checked ? 'text-milktea-200 line-through' : 'text-milktea-900'" class="font-bold text-sm">{{ item.name }}</span>
                                </label>
                                <span class="text-xs font-bold text-milktea-400">x{{ item.quantity }}</span>
                            </div>
                        </div>
                    </div>
                </template>
            </div>
            <button @click="openLuggageForm" class="absolute bottom-6 right-1 bg-milktea-500 text-white w-14 h-14 rounded-full shadow-lg flex items-center justify-center text-xl z-20">
                <i class="fas fa-plus"></i>
            </button>
        </div>

    </main>

    <nav class="bg-white border-t border-milktea-200 absolute bottom-0 w-full z-30 pb-safe">
        <div class="flex justify-around items-center h-16">
            <button @click="currentTab = 'itinerary'" :class="currentTab === 'itinerary' ? 'text-milktea-800' : 'text-milktea-300'" class="flex flex-col items-center w-1/4">
                <i class="fas fa-calendar-alt text-xl"></i><span class="text-[10px] font-bold">行程</span>
            </button>
            <button @click="currentTab = 'map'" :class="currentTab === 'map' ? 'text-milktea-800' : 'text-milktea-300'" class="flex flex-col items-center w-1/4">
                <i class="fas fa-map text-xl"></i><span class="text-[10px] font-bold">地圖</span>
            </button>
            <button @click="currentTab = 'expenses'" :class="currentTab === 'expenses' ? 'text-milktea-800' : 'text-milktea-300'" class="flex flex-col items-center w-1/4">
                <i class="fas fa-wallet text-xl"></i><span class="text-[10px] font-bold">記帳</span>
            </button>
            <button @click="currentTab = 'luggage'" :class="currentTab === 'luggage' ? 'text-milktea-800' : 'text-milktea-300'" class="flex flex-col items-center w-1/4">
                <i class="fas fa-suitcase-rolling text-xl"></i><span class="text-[10px] font-bold">行李</span>
            </button>
        </div>
    </nav>

</div>

<script type="module">
    import { createApp, ref, computed, onMounted, watch, nextTick } from "https://unpkg.com/vue@3/dist/vue.esm-browser.js";
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
    import { getFirestore, collection, onSnapshot, doc, setDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

    // 🌟 在此填入您的 Firebase Config
    const MY_FIREBASE_CONFIG = null; 

    createApp({
        setup() {
            const currentTab = ref('itinerary');
            const currentDay = ref(0);
            const isCloudSync = ref(false);
            let fDb = null;
            let fAuth = null;
            const cloudAppId = 'hokkaido-2026-family';

            const itinerary = ref([
                { dayNum: 1, dateShort: '7/3', title: '啟程與函館首夜', area: '函館', events: [{ time: '12:00', title: '星宇 JX860 起飛', icon: 'fas fa-plane', guide: '出發！' }, { time: '18:40', title: '幸運小丑漢堡', icon: 'fas fa-hamburger', lat: 41.767, lng: 140.716, guide: '函館必吃' }] },
                { dayNum: 2, dateShort: '7/4', title: '函館經典巡禮', area: '函館', events: [{ time: '09:15', title: '五稜郭塔', icon: 'fas fa-star', lat: 41.794, lng: 140.754, guide: '星形堡壘' }] }
            ]);

            const expenses = ref([]);
            const showExpenseModal = ref(false);
            const expenseForm = ref({ shop: '', category: '飲食', amountJPY: '', amountTWD: '' });

            const luggagePeople = ['家禎', '宇淳', '侑侑', '懷懷', '媽媽'];
            const luggageCategories = ['行李&證件', '衣/配件', '日常、盥洗', '3C/其他'];
            const currentLuggagePerson = ref('家禎');
            const luggageList = ref([]);
            const showLuggageModal = ref(false);
            const luggageForm = ref({ person: '家禎', category: '行李&證件', name: '', quantity: 1, checked: false });

            const selectDay = (i) => currentDay.value = i;
            const handleJpyInput = () => expenseForm.value.amountTWD = Math.round(expenseForm.value.amountJPY * 0.205) || '';

            const saveExpense = async () => {
                const data = { ...expenseForm.value, id: Date.now().toString(), dayNum: itinerary.value[currentDay.value].dayNum };
                if (isCloudSync.value) await setDoc(doc(fDb, 'artifacts', cloudAppId, 'public', 'data', 'expenses', data.id), data);
                else expenses.value.push(data);
                showExpenseModal.value = false;
            };

            const saveLuggage = async () => {
                const data = { ...luggageForm.value, id: Date.now().toString(), person: currentLuggagePerson.value };
                if (isCloudSync.value) await setDoc(doc(fDb, 'artifacts', cloudAppId, 'public', 'data', 'luggage', data.id), data);
                else luggageList.value.push(data);
                showLuggageModal.value = false;
            };

            const toggleLuggageChecked = async (item) => {
                if (isCloudSync.value) await setDoc(doc(fDb, 'artifacts', cloudAppId, 'public', 'data', 'luggage', item.id), { ...item });
            };

            onMounted(() => {
                if (MY_FIREBASE_CONFIG) {
                    const app = initializeApp(MY_FIREBASE_CONFIG);
                    fAuth = getAuth(app);
                    fDb = getFirestore(app);
                    signInAnonymously(fAuth).then(() => {
                        isCloudSync.value = true;
                        onSnapshot(collection(fDb, 'artifacts', cloudAppId, 'public', 'data', 'expenses'), s => expenses.value = s.docs.map(d => d.data()));
                        onSnapshot(collection(fDb, 'artifacts', cloudAppId, 'public', 'data', 'luggage'), s => luggageList.value = s.docs.map(d => d.data()));
                    });
                }
            });

            return { 
                currentTab, currentDay, itinerary, currentDayData: computed(() => itinerary.value[currentDay.value]), selectDay, isCloudSync,
                expenses, dayExpenses: computed(() => expenses.value.filter(e => e.dayNum === itinerary.value[currentDay.value].dayNum)),
                dayTotalTWD: computed(() => expenses.value.filter(e => e.dayNum === itinerary.value[currentDay.value].dayNum).reduce((s, e) => s + (parseInt(e.amountTWD) || 0), 0)),
                showExpenseModal, expenseForm, handleJpyInput, saveExpense,
                luggagePeople, luggageCategories, currentLuggagePerson, luggageList, getLuggageByCategory: (c) => luggageList.value.filter(i => i.person === currentLuggagePerson.value && i.category === c),
                showLuggageModal, luggageForm, saveLuggage, toggleLuggageChecked, currentPersonPackedCount: computed(() => luggageList.value.filter(i => i.person === currentLuggagePerson.value && i.checked).length),
                currentPersonTotalCount: computed(() => luggageList.value.filter(i => i.person === currentLuggagePerson.value).length),
                openExpenseForm: () => showExpenseModal.value = true,
                openLuggageForm: () => showLuggageModal.value = true
            };
        }
    }).mount('#app');
</script>

</body></html>
